# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: mslearn-ai-agents-06-build-workflow-ms-foundry
metadata:
  template: mslearn-ai-agents-06-build-workflow-ms-foundry@1.0.0

# Infrastructure-only azd project. The postprovision hook writes src/.env from
# the deployment outputs so the exercise code can connect to the Foundry project.
hooks:
  postprovision:
    posix:
      shell: sh
      run: ./scripts/postprovision.sh
      interactive: false
      continueOnError: false
    windows:
      shell: pwsh
      run: ./scripts/postprovision.ps1
      interactive: false
      continueOnError: false
