# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: mslearn-ai-agents-01-build-agent-portal-and-vscode
metadata:
  template: mslearn-ai-agents-01-build-agent-portal-and-vscode@1.0.0

# This exercise provisions Azure AI Foundry infrastructure only (no hosted app
# service). After provisioning, the postprovision hook creates the agent and
# uploads its grounding data so the CLI client can talk to it immediately.
hooks:
  postprovision:
    posix:
      shell: sh
      run: ./scripts/setup.sh
      interactive: true
      continueOnError: false
    windows:
      shell: pwsh
      run: ./scripts/setup.ps1
      interactive: true
      continueOnError: false
